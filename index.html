<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maia Racket Center — Bar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#2A2A2A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem;}
  .logo{width:80px;height:80px;border-radius:50%;background:#787B63;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
  .brand{text-align:center;}
  .brand h1{font-family:'DM Serif Display',serif;color:white;font-size:2rem;line-height:1.1;}
  .brand p{color:#C4C8B0;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;margin-top:.3rem;}
  .cards{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:320px;}
  .card{background:#333;border-radius:16px;padding:1.4rem 1.5rem;text-decoration:none;display:flex;align-items:center;gap:1.1rem;border:1.5px solid #444;transition:border-color .2s,background .2s;}
  .card:hover{background:#3a3a3a;border-color:#787B63;}
  .card-icon{font-size:1.8rem;flex-shrink:0;}
  .card-body{}
  .card-title{color:white;font-weight:600;font-size:1rem;}
  .card-desc{color:#888;font-size:.78rem;margin-top:.2rem;line-height:1.4;}
  .card-arrow{margin-left:auto;color:#555;font-size:1.1rem;flex-shrink:0;}
  .card:hover .card-arrow{color:#787B63;}
  .footer{color:#555;font-size:.72rem;text-align:center;}
</style>
</head>
<body>
  <div class="logo">🎾</div>
  <div class="brand">
    <h1>Maia Racket Center</h1>
    <p>Bar & Esplanada</p>
  </div>
  <div class="cards">
    <a class="card" href="./menu/">
      <div class="card-icon">🍽️</div>
      <div class="card-body">
        <div class="card-title">Menu & Pedidos</div>
        <div class="card-desc">Para clientes — seleciona a mesa e faz o teu pedido</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
    <a class="card" href="./admin/">
      <div class="card-icon">⚙️</div>
      <div class="card-body">
        <div class="card-title">Gestão do Bar</div>
        <div class="card-desc">Para o bar — pedidos em tempo real e configuração</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>
  <div class="footer">Maia Racket Center © 2026</div>
</body>
</html>
